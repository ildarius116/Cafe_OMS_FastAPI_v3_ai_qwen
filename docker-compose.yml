services:
  # PostgreSQL - база данных
  db:
    image: postgres:15-alpine
    container_name: cafe-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-cafe_orders}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cafe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend - FastAPI приложение
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:${DB_PORT:-5432}/${DB_NAME:-cafe_orders}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - FRONTEND_URLS=${FRONTEND_URLS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - cafe-network
    volumes:
      - ./app:/app/app
      - ./create_test_data.py:/app/create_test_data.py
      - ./create_superuser.py:/app/create_superuser.py

  # Frontend - React приложение (development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cafe-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - cafe-network
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js

  # Nginx - reverse proxy (опционально, для production)
  nginx:
    image: nginx:alpine
    container_name: cafe-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cafe-network
    profiles:
      - production

networks:
  cafe-network:
    driver: bridge

volumes:
  postgres_data:
